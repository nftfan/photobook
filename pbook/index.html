
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Gallery</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Jost:wght@200;300;400;500&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0d0b09;--surface:#151210;--surface2:#1c1814;--border:#26211c;--border2:#332c25;
  --accent:#c8a46e;--accent2:#8a6a42;--accent3:#e8c98a;
  --text:#ede5d8;--muted:#7a6e62;--muted2:#4a4238;
  --header-h:68px;--folder-w:200px;--sidebar-w:220px;
}
html,body{min-height:100vh;background:var(--bg);color:var(--text);font-family:'Jost',sans-serif;font-weight:300}

header{
  position:fixed;top:0;left:0;right:0;height:var(--header-h);
  background:rgba(13,11,9,.95);backdrop-filter:blur(16px);
  border-bottom:1px solid var(--border);
  display:flex;align-items:center;justify-content:space-between;
  padding:0 28px;z-index:100;gap:16px;
}
.logo{font-family:'Cormorant Garamond',serif;font-size:1.4rem;font-weight:300;font-style:italic;letter-spacing:.05em;color:var(--accent);white-space:nowrap;cursor:pointer}
.header-center{flex:1;display:flex;align-items:center;gap:0;overflow:hidden}
.breadcrumb{display:flex;align-items:center;gap:0;overflow:hidden}
.bc-sep{color:var(--muted2);font-size:.8rem;padding:0 6px;flex-shrink:0}
.bc-item{
  font-size:.72rem;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);
  cursor:pointer;padding:5px 8px;border-radius:2px;white-space:nowrap;
  transition:color .18s;overflow:hidden;text-overflow:ellipsis;max-width:200px;
}
.bc-item:hover{color:var(--accent)}
.bc-item.active{color:var(--text);cursor:default}
.header-right{display:flex;align-items:center;gap:9px;flex-shrink:0}
.hdr-count{font-size:.68rem;letter-spacing:.12em;text-transform:uppercase;color:var(--muted);white-space:nowrap}

.sync-dot{
  width:8px;height:8px;border-radius:50%;background:var(--muted2);
  transition:background .3s,box-shadow .3s;flex-shrink:0;
}
.sync-dot.online{background:#5a9a5a;box-shadow:0 0 8px rgba(90,154,90,.5)}
.sync-dot.syncing{background:var(--accent);box-shadow:0 0 8px rgba(200,164,110,.6);animation:pulse 1.2s ease-in-out infinite}
.sync-dot.error{background:#a04545}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}

.btn{
  cursor:pointer;display:inline-flex;align-items:center;gap:7px;
  padding:8px 16px;background:transparent;border-radius:2px;
  font-family:'Jost',sans-serif;font-size:.68rem;font-weight:400;letter-spacing:.12em;
  text-transform:uppercase;transition:all .2s;white-space:nowrap;
}
.btn-accent{border:1px solid var(--accent);color:var(--accent)}
.btn-accent:hover{background:var(--accent);color:var(--bg)}
.btn-ghost{border:1px solid var(--border);color:var(--muted)}
.btn-ghost:hover{border-color:var(--border2);color:var(--text)}
.upload-btn{position:relative}
.upload-btn input[type=file]{position:absolute;inset:0;opacity:0;cursor:pointer;width:100%;height:100%}

.sort-wrap{position:relative}
.sort-menu{
  position:absolute;top:calc(100% + 6px);right:0;
  background:var(--surface);border:1px solid var(--border2);border-radius:4px;
  min-width:170px;display:none;z-index:120;
  box-shadow:0 8px 24px rgba(0,0,0,.5);overflow:hidden;
}
.sort-menu.active{display:block;animation:modalIn .15s ease}
.sort-opt{
  padding:9px 14px;font-size:.7rem;letter-spacing:.07em;
  cursor:pointer;color:var(--muted);transition:background .14s,color .14s;
  display:flex;align-items:center;justify-content:space-between;gap:10px;
}
.sort-opt:hover{background:var(--surface2);color:var(--text)}
.sort-opt.active{color:var(--accent)}
.sort-opt .check{font-size:.78rem;opacity:0}
.sort-opt.active .check{opacity:1}

.sidebar{
  position:fixed;top:var(--header-h);left:0;bottom:0;width:var(--sidebar-w);
  background:var(--surface);border-right:1px solid var(--border);
  padding:24px 0 24px;overflow-y:auto;z-index:90;
}
.sb-section{padding:0 20px;margin-bottom:8px;display:flex;align-items:center;justify-content:space-between}
.sb-title{font-family:'Cormorant Garamond',serif;font-size:.95rem;font-style:italic;color:var(--muted);letter-spacing:.04em}
.sb-add{
  width:22px;height:22px;border-radius:50%;cursor:pointer;
  border:1px solid var(--border2);color:var(--muted);background:transparent;
  display:flex;align-items:center;justify-content:center;transition:all .18s;
}
.sb-add:hover{border-color:var(--accent);color:var(--accent)}
.sb-list{margin-top:6px}
.sb-page{
  position:relative;padding:10px 20px 10px 24px;cursor:pointer;
  border-left:2px solid transparent;
  display:flex;align-items:center;justify-content:space-between;gap:8px;
  transition:background .15s,border-color .15s;
}
.sb-page:hover{background:var(--surface2)}
.sb-page.active{border-left-color:var(--accent);background:var(--surface2)}
.sb-page-name{
  font-size:.78rem;letter-spacing:.03em;color:var(--text);
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;flex:1;
}
.sb-page.active .sb-page-name{color:var(--accent3)}
.sb-page-acts{display:flex;gap:4px;opacity:0;transition:opacity .15s;flex-shrink:0}
.sb-page:hover .sb-page-acts{opacity:1}
.sb-act-btn{
  width:20px;height:20px;border-radius:50%;cursor:pointer;
  background:transparent;border:none;color:var(--muted);
  display:flex;align-items:center;justify-content:center;transition:color .15s;
}
.sb-act-btn:hover{color:var(--accent)}
.sb-act-btn.del:hover{color:#c06060}
.sb-mobile-toggle{display:none}

main{
  padding-top:calc(var(--header-h) + 32px);padding-bottom:64px;min-height:100vh;
  padding-left:var(--sidebar-w);
}

.empty-state{
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  min-height:55vh;text-align:center;gap:16px;padding:40px;animation:fadeIn .6s ease;
}
.empty-icon{width:64px;height:64px;border:1px solid var(--border2);border-radius:50%;display:flex;align-items:center;justify-content:center;color:var(--muted)}
.empty-state h2{font-family:'Cormorant Garamond',serif;font-size:1.7rem;font-weight:300;font-style:italic}
.empty-state p{font-size:.82rem;color:var(--muted);max-width:320px;line-height:1.75}
.fmt-row{display:flex;gap:6px;flex-wrap:wrap;justify-content:center}
.fmt-tag{font-size:.62rem;letter-spacing:.1em;text-transform:uppercase;color:var(--accent2);border:1px solid var(--border);padding:3px 8px;border-radius:2px}

.section-hd{display:flex;align-items:center;justify-content:space-between;padding:0 24px 14px;}
.section-title{font-family:'Cormorant Garamond',serif;font-size:1.05rem;font-style:italic;color:var(--muted);letter-spacing:.03em}

.folders-grid{
  display:grid;grid-template-columns:repeat(auto-fill,minmax(var(--folder-w),1fr));
  gap:18px;padding:0 24px 36px;
}

.folder-card{position:relative;cursor:pointer;animation:itemIn .35s ease both;}
.folder-card:hover .folder-body{border-color:var(--accent2);background:var(--surface2)}
.folder-card:hover .folder-tab{background:var(--accent2)}
.folder-card:hover .folder-cover img{transform:scale(1.06)}
.folder-tab{
  width:45%;height:10px;background:var(--border2);
  border-radius:4px 4px 0 0;margin-left:12px;
  transition:background .25s;position:relative;z-index:1;
}
.folder-body{
  background:var(--surface);border:1px solid var(--border2);
  border-radius:0 6px 6px 6px;overflow:hidden;
  transition:border-color .25s,background .25s;position:relative;
}
.folder-cover{width:100%;aspect-ratio:4/3;display:grid;overflow:hidden;position:relative;}
.folder-cover.n0{background:var(--surface2);display:flex;align-items:center;justify-content:center}
.folder-cover.n0 svg{color:var(--muted2)}
.folder-cover.n1{grid-template-columns:1fr}
.folder-cover.n2{grid-template-columns:1fr 1fr}
.folder-cover.n3{grid-template-columns:1fr 1fr;grid-template-rows:1fr 1fr}
.folder-cover.n3 .fc-img:first-child{grid-row:1/3}
.folder-cover.n4{grid-template-columns:1fr 1fr;grid-template-rows:1fr 1fr}
.fc-img{overflow:hidden;position:relative}
.fc-img img{width:100%;height:100%;object-fit:cover;transition:transform .4s cubic-bezier(.25,.46,.45,.94);display:block}

.folder-footer{padding:10px 13px 11px}
.folder-name{
  font-size:.8rem;letter-spacing:.04em;color:var(--text);
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;display:block;
}
.folder-meta{display:flex;align-items:center;justify-content:space-between;margin-top:3px;gap:6px}
.folder-count{font-size:.62rem;color:var(--muted);letter-spacing:.06em;white-space:nowrap}
.folder-date{font-size:.6rem;color:var(--muted2);letter-spacing:.05em;white-space:nowrap}

.folder-actions{
  position:absolute;top:6px;right:6px;
  display:flex;gap:5px;opacity:0;transition:opacity .18s;z-index:20;
}
.folder-card:hover .folder-actions{opacity:1}
.fa-btn{
  width:24px;height:24px;border-radius:50%;cursor:pointer;
  background:rgba(0,0,0,.65);border:1px solid rgba(255,255,255,.12);
  color:rgba(255,255,255,.7);display:flex;align-items:center;justify-content:center;
  transition:background .18s;
}
.fa-btn:hover{background:rgba(180,50,50,.8);color:#fff}
.fa-btn.rename:hover{background:rgba(100,100,180,.8);color:#fff}

.photo-grid{columns:3 240px;column-gap:10px;padding:0 24px}
@media(max-width:560px){.photo-grid{columns:2 120px}}

.photo-item{
  break-inside:avoid;margin-bottom:10px;position:relative;
  overflow:hidden;border-radius:4px;background:var(--surface);
  animation:itemIn .38s ease both;
}
.photo-item.clickable{cursor:zoom-in}
.photo-item img{width:100%;display:block;transition:transform .4s cubic-bezier(.25,.46,.45,.94)}
.photo-item:hover img{transform:scale(1.05)}

.photo-overlay{
  position:absolute;inset:0;
  background:linear-gradient(to top,rgba(0,0,0,.75) 0%,transparent 50%);
  opacity:0;transition:opacity .25s;
  display:flex;flex-direction:column;justify-content:flex-end;
  padding:11px 10px;gap:3px;pointer-events:none;
}
.photo-item:hover .photo-overlay{opacity:1}
.photo-name-lbl{font-size:.68rem;letter-spacing:.05em;color:rgba(255,255,255,.88);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.photo-meta-lbl{font-size:.6rem;color:rgba(255,255,255,.42);letter-spacing:.05em}
.raw-badge{display:inline-block;font-size:.56rem;letter-spacing:.1em;text-transform:uppercase;background:var(--accent);color:var(--bg);padding:2px 5px;border-radius:2px;align-self:flex-start;margin-bottom:2px}

.item-del{
  position:absolute;top:6px;right:6px;width:24px;height:24px;border-radius:50%;
  background:rgba(0,0,0,.6);border:1px solid rgba(255,255,255,.12);color:rgba(255,255,255,.65);
  display:flex;align-items:center;justify-content:center;opacity:0;
  transition:opacity .18s,background .18s;cursor:pointer;z-index:10;
}
.photo-item:hover .item-del{opacity:1}
.item-del:hover{background:rgba(180,50,50,.85);color:#fff}

.raw-proc,.raw-err,.uploading{
  width:100%;aspect-ratio:3/2;background:var(--surface2);
  display:flex;flex-direction:column;align-items:center;justify-content:center;gap:10px;
}
.raw-proc .spin,.uploading .spin{width:24px;height:24px;border:2px solid var(--border2);border-top-color:var(--accent);border-radius:50%;animation:spin .8s linear infinite}
.raw-proc span,.raw-err span,.uploading span{font-size:.62rem;letter-spacing:.09em;text-transform:uppercase;color:var(--muted);text-align:center;padding:0 12px}
.raw-err svg{color:#6a3838}

@keyframes itemIn{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes modalIn{from{opacity:0;transform:translateY(-10px) scale(.97)}to{opacity:1;transform:translateY(0) scale(1)}}

.lightbox{display:none;position:fixed;inset:0;background:rgba(0,0,0,.97);z-index:300;align-items:center;justify-content:center;flex-direction:column}
.lightbox.active{display:flex;animation:fadeIn .16s ease}
.lb-wrap{max-width:94vw;max-height:86vh;display:flex;align-items:center;justify-content:center}
.lb-img{max-width:94vw;max-height:86vh;object-fit:contain;border-radius:2px;box-shadow:0 20px 60px rgba(0,0,0,.9);display:block}
.lb-info{margin-top:12px;text-align:center}
.lb-title{font-family:'Cormorant Garamond',serif;font-size:1rem;font-style:italic;color:var(--text)}
.lb-sub{font-size:.67rem;color:var(--muted);letter-spacing:.08em;margin-top:3px}
.lb-close{position:fixed;top:18px;right:22px;background:transparent;border:1px solid rgba(255,255,255,.16);color:rgba(255,255,255,.6);width:36px;height:36px;border-radius:50%;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:1rem;transition:all .16s}
.lb-close:hover{border-color:rgba(255,255,255,.55);color:#fff}
.lb-nav{position:fixed;top:50%;transform:translateY(-50%);background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.09);color:rgba(255,255,255,.6);width:40px;height:40px;border-radius:50%;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:1.2rem;transition:background .16s}
.lb-nav:hover{background:rgba(255,255,255,.12);color:#fff}
.lb-prev{left:14px}.lb-next{right:14px}
.lb-ctr{position:fixed;top:22px;left:50%;transform:translateX(-50%);font-size:.65rem;letter-spacing:.12em;color:rgba(255,255,255,.32);pointer-events:none}

.modal-bg{display:none;position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:400;align-items:center;justify-content:center}
.modal-bg.active{display:flex}
.modal{background:var(--surface);border:1px solid var(--border2);border-radius:6px;padding:28px 28px 24px;width:360px;max-width:92vw;animation:modalIn .2s ease}
.modal h3{font-family:'Cormorant Garamond',serif;font-size:1.25rem;font-style:italic;font-weight:400;color:var(--text);margin-bottom:18px}
.modal input{
  width:100%;background:var(--bg);border:1px solid var(--border2);color:var(--text);
  font-family:'Jost',sans-serif;font-size:.85rem;padding:10px 13px;border-radius:3px;
  outline:none;transition:border-color .18s;letter-spacing:.02em;
}
.modal input:focus{border-color:var(--accent)}
.modal-sub{font-size:.7rem;color:var(--muted);margin-top:10px;letter-spacing:.04em;line-height:1.6}
.modal-btns{display:flex;gap:8px;margin-top:18px;justify-content:flex-end}

.toast{
  position:fixed;bottom:22px;left:50%;transform:translateX(-50%) translateY(12px);
  background:var(--surface);border:1px solid var(--border2);color:var(--text);
  padding:8px 17px;border-radius:3px;font-size:.74rem;letter-spacing:.06em;
  opacity:0;transition:opacity .25s,transform .25s;pointer-events:none;z-index:500;
}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

.drag-ov{
  display:none;position:fixed;inset:0;background:rgba(200,164,110,.06);
  border:2px dashed var(--accent);z-index:200;
  align-items:center;justify-content:center;flex-direction:column;
  gap:10px;color:var(--accent);font-family:'Cormorant Garamond',serif;
  font-size:1.7rem;font-style:italic;pointer-events:none;
}
.drag-ov.active{display:flex}

.up-status{
  position:fixed;bottom:60px;right:22px;
  background:var(--surface);border:1px solid var(--border2);border-radius:6px;
  padding:12px 16px;min-width:240px;max-width:340px;z-index:480;
  box-shadow:0 8px 24px rgba(0,0,0,.55);
  opacity:0;pointer-events:none;transform:translateY(10px);
  transition:opacity .25s,transform .25s;
}
.up-status.show{opacity:1;transform:translateY(0)}
.up-status .row{display:flex;align-items:center;justify-content:space-between;gap:10px;margin-bottom:6px}
.up-status .lbl{font-size:.68rem;letter-spacing:.08em;text-transform:uppercase;color:var(--accent)}
.up-status .ct{font-size:.65rem;color:var(--muted)}
.up-status .bar{height:3px;background:var(--border2);border-radius:2px;overflow:hidden}
.up-status .fill{height:100%;background:var(--accent);width:0%;transition:width .2s}

.divider{height:1px;background:var(--border);margin:0 24px 28px}

@media(max-width:760px){
  :root{--sidebar-w:0px}
  main{padding-left:0}
  .sidebar{transform:translateX(-100%);transition:transform .25s;width:240px}
  .sidebar.open{transform:translateX(0);box-shadow:0 0 30px rgba(0,0,0,.6)}
  .sb-mobile-toggle{display:flex;align-items:center;justify-content:center;width:30px;height:30px;background:transparent;border:1px solid var(--border2);color:var(--muted);border-radius:3px;cursor:pointer}
  header{padding:0 14px;gap:8px}
  .logo{font-size:1.1rem}
}
</style>
</head>
<body>

<header>
  <button class="sb-mobile-toggle" id="sbToggle" aria-label="Toggle pages">
    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
  </button>
  <span class="logo" id="logo">Gallery</span>

  <div class="header-center"><nav class="breadcrumb" id="breadcrumb"></nav></div>

  <div class="header-right">
    <span class="sync-dot" id="syncDot" title="Sync status"></span>
    <span class="hdr-count" id="hdrCount"></span>

    <div class="sort-wrap">
      <button class="btn btn-ghost" id="sortBtn" title="Sort">
        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 6h18M6 12h12M10 18h4"/></svg>
        Sort
      </button>
      <div class="sort-menu" id="sortMenu">
        <div class="sort-opt" data-sort="date-desc"><span>Newest first</span><span class="check">✓</span></div>
        <div class="sort-opt" data-sort="date-asc"><span>Oldest first</span><span class="check">✓</span></div>
        <div class="sort-opt" data-sort="name-asc"><span>Name (A–Z)</span><span class="check">✓</span></div>
        <div class="sort-opt" data-sort="name-desc"><span>Name (Z–A)</span><span class="check">✓</span></div>
        <div class="sort-opt" data-sort="count-desc"><span>Most photos</span><span class="check">✓</span></div>
      </div>
    </div>

    <button class="btn btn-ghost" id="newFolderBtn">
      <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"/><line x1="12" y1="11" x2="12" y2="17"/><line x1="9" y1="14" x2="15" y2="14"/></svg>
      New Folder
    </button>
    <label class="btn btn-accent upload-btn" id="uploadLabel">
      <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
      Upload
      <input type="file" id="fileInput" accept="image/*,.nef,.NEF,.cr2,.CR2,.arw,.ARW,.dng,.DNG,.orf,.ORF,.rw2,.RW2,.raf,.RAF" multiple/>
    </label>
  </div>
</header>

<aside class="sidebar" id="sidebar">
  <div class="sb-section">
    <span class="sb-title">Pages</span>
    <button class="sb-add" id="newPageBtn" title="New page">
      <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
    </button>
  </div>
  <div class="sb-list" id="sbList"></div>
</aside>

<main id="main"></main>

<div class="lightbox" id="lightbox">
  <button class="lb-close" id="lbClose">&#x2715;</button>
  <button class="lb-nav lb-prev" id="lbPrev">&#8249;</button>
  <button class="lb-nav lb-next" id="lbNext">&#8250;</button>
  <span class="lb-ctr" id="lbCtr"></span>
  <div class="lb-wrap" id="lbWrap"></div>
  <div class="lb-info"><div class="lb-title" id="lbTitle"></div><div class="lb-sub" id="lbSub"></div></div>
</div>

<div class="modal-bg" id="modalBg">
  <div class="modal">
    <h3 id="modalTitle">New Folder</h3>
    <input type="text" id="modalInput" placeholder="Name…" maxlength="60"/>
    <div class="modal-sub" id="modalSub"></div>
    <div class="modal-btns">
      <button class="btn btn-ghost" id="modalCancel">Cancel</button>
      <button class="btn btn-accent" id="modalConfirm">Create</button>
    </div>
  </div>
</div>

<div class="drag-ov" id="dragOv">
  <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1">
    <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>

/* ═══════════════════════════════════════════════

function extractJpegFromRaw(ab){
  const b=new Uint8Array(ab),L=b.length;
  let best=null;
  for(let i=0;i<L-3;i++){
    if(b[i]===0xFF&&b[i+1]===0xD8&&b[i+2]===0xFF){
      for(let j=i+2;j<L-1;j++){
        if(b[j]===0xFF&&b[j+1]===0xD9){
          const sz=j+2-i;
          if(!best||sz>(best.e-best.s))best={s:i,e:j+2};
          break;
        }
      }
    }
  }
  if(!best)return null;
  return new Blob([new Uint8Array(ab,best.s,best.e-best.s)],{type:'image/jpeg'});
}
function reencodeBlob(blob){
  return new Promise((res,rej)=>{
    const url=URL.createObjectURL(blob);
    const img=new Image();
    img.onload=()=>{
      const c=document.createElement('canvas');
      c.width=img.naturalWidth;c.height=img.naturalHeight;
      c.getContext('2d').drawImage(img,0,0);
      c.toBlob(b=>{URL.revokeObjectURL(url);b?res(b):rej();},'image/jpeg',.88);
    };
    img.onerror=()=>{URL.revokeObjectURL(url);rej()};
    img.src=url;
  });
}
async function decodeRawToBlob(file){
  try{
    const ab=await file.arrayBuffer();
    const embedded=extractJpegFromRaw(ab);
    if(!embedded)return null;
    return await reencodeBlob(embedded);
  }catch{return null;}
}

const safeExt=name=>{
  const e=(name.split('.').pop()||'bin').toLowerCase();
  return e.replace(/[^a-z0-9]/g,'').slice(0,8)||'bin';
};
function buildKey(prefix,id,name){return `${prefix}/${id}.${safeExt(name)}`;}
function publicUrl(key){
  return `${S3_ENDPOINT}/${S3_BUCKET}/${encodeURIComponent(key).replace(/%2F/g,'/')}`;
}
function uploadBlob(key,blob,contentType,onProgress){
  return new Promise((res,rej)=>{
    const params={
      Bucket:S3_BUCKET,Key:key,Body:blob,
      ContentType:contentType||blob.type||'application/octet-stream',
      ACL:'public-read',
    };
    const req=s3.upload(params);
    if(onProgress)req.on('httpUploadProgress',e=>{if(e.total)onProgress(e.loaded/e.total);});
    req.send((err)=>{
      if(err){
        // Retry without ACL if backend doesn't accept it
        if(/ACL|InvalidArgument|NotImplemented|AccessDenied/i.test(err.code||err.message||'')){
          delete params.ACL;
          const req2=s3.upload(params);
          if(onProgress)req2.on('httpUploadProgress',e=>{if(e.total)onProgress(e.loaded/e.total);});
          req2.send((e2)=>e2?rej(e2):res(publicUrl(key)));
        } else rej(err);
      } else res(publicUrl(key));
    });
  });
}
function deleteObject(key){
  return new Promise(res=>{
    if(!key)return res();
    s3.deleteObject({Bucket:S3_BUCKET,Key:key},err=>{
      if(err)console.warn('S3 delete failed',key,err);
      res();
    });
  });
}

function sortFolders(list){

    if(sortMode==='name-asc') return a.name.localeCompare(b.name);
    if(sortMode==='name-desc')return b.name.localeCompare(a.name);
    if(sortMode==='count-desc'){
      const ca=photos.filter(p=>p.folderId===a.id).length;
      const cb=photos.filter(p=>p.folderId===b.id).length;
      return cb-ca;
    }
    return 0;
  });
  return arr;
}
function sortPhotos(list){
  const arr=[...list];
  arr.sort((a,b)=>{
    if(sortMode==='date-desc')return new Date(b.date)-new Date(a.date);
    if(sortMode==='date-asc') return new Date(a.date)-new Date(b.date);
    if(sortMode==='name-asc') return a.name.localeCompare(b.name);
    if(sortMode==='name-desc')return b.name.localeCompare(a.name);
    if(sortMode==='count-desc')return new Date(b.date)-new Date(a.date);
    return 0;
  });
  return arr;
}

async function addFiles(fileList){
  if(!currentPageId){toast('Select a page first');return;}
  const files=Array.from(fileList);
  if(!files.length)return;

  _upQueue={done:0,total:files.length,current:0};
  showUpStatus();updateUpStatus();

  let added=0,failed=0;
  for(const file of files){
    try{
      await uploadSingle(file);
      added++;
    }catch(err){
      console.error('Upload failed for',file.name,err);
      failed++;
      toast(`Failed: ${file.name}`);
    }
    _upQueue.done++;_upQueue.current=0;updateUpStatus();
  }
  hideUpStatus();
  if(added)toast(`${added} photo${added!==1?'s':''} added${failed?` · ${failed} failed`:''}`);
  else if(failed)toast(`Upload failed — check CORS & credentials`);
}

async function uploadSingle(file){
  const id=uid();
  const raw=isRaw(file.name);
  const now=new Date().toISOString();

  // Pending record so UI shows uploading state
  const pending={
    pageId:currentPageId,
    folderId:currentFolderId||null,
    name:file.name,
    size:file.size,
    date:now,
    isRaw:raw,
    status:'uploading',
    previewUrl:null,previewKey:null,
    originalUrl:null,originalKey:null,
  };
  await refPhotos.child(id).set(pending);

  let previewBlob=null;

  if(raw){
    previewBlob=await decodeRawToBlob(file);
    if(!previewBlob){
      // Upload only the original RAW; mark preview unavailable
      try{
        const origKey=buildKey('originals',id,file.name);
        const origUrl=await uploadBlob(origKey,file,file.type||'application/octet-stream',f=>{_upQueue.current=f;updateUpStatus();});
        await refPhotos.child(id).update({status:'ok',decodeFailed:true,originalKey:origKey,originalUrl:origUrl});
      }catch(e){
        await refPhotos.child(id).update({status:'failed',decodeFailed:true});
        throw e;
      }
      return;
    }
  } else {
    previewBlob=file;
  }

  const previewKey=buildKey('previews',id,raw?'preview.jpg':file.name);
  const previewType=raw?'image/jpeg':(file.type||'image/jpeg');
  const previewUrl=await uploadBlob(previewKey,previewBlob,previewType,f=>{
    _upQueue.current=raw?f*0.6:f;updateUpStatus();
  });

  let originalKey=null,originalUrl=null;
  if(raw){
    originalKey=buildKey('originals',id,file.name);
    originalUrl=await uploadBlob(originalKey,file,file.type||'application/octet-stream',f=>{
      _upQueue.current=0.6+f*0.4;updateUpStatus();
    });
  }

  await refPhotos.child(id).update({
    status:'ok',
    previewKey,previewUrl,
    originalKey,originalUrl,
  });
}

/* ═══════════════════════════════════════════════
   MODAL
═══════════════════════════════════════════════ */
const $modalBg   =document.getElementById('modalBg');
const $modalTitle=document.getElementById('modalTitle');
const $modalInput=document.getElementById('modalInput');
const $modalSub  =document.getElementById('modalSub');
const $modalOk   =document.getElementById('modalConfirm');
const $modalX    =document.getElementById('modalCancel');
let _modalMode=null,_editTarget=null;

function openCreateModal(){
  if(!currentPageId){toast('Create or select a page first');return;}
  const page=pages.find(p=>p.id===currentPageId);
  _modalMode='createFolder';_editTarget=null;
  $modalTitle.textContent='New Folder';
  $modalInput.value='';$modalInput.placeholder='Folder name…';
  $modalSub.textContent=`Will be created in page "${page?.name||'—'}"`;
  $modalOk.textContent='Create';
  $modalBg.classList.add('active');
  setTimeout(()=>$modalInput.focus(),60);
}
function openRenameModal(folder){
  _modalMode='renameFolder';_editTarget=folder;
  $modalTitle.textContent='Rename Folder';
  $modalInput.value=folder.name;$modalInput.placeholder='Folder name…';
  $modalSub.textContent='';
  $modalOk.textContent='Rename';
  $modalBg.classList.add('active');
  setTimeout(()=>{$modalInput.focus();$modalInput.select();},60);
}
function openCreatePageModal(){
  _modalMode='createPage';_editTarget=null;
  $modalTitle.textContent='New Page';
  $modalInput.value='';$modalInput.placeholder='Page name (e.g. Travel, Family)…';
  $modalSub.textContent='Pages are like sections — each holds its own folders.';
  $modalOk.textContent='Create';
  $modalBg.classList.add('active');
  setTimeout(()=>$modalInput.focus(),60);
}
function openRenamePageModal(page){
  _modalMode='renamePage';_editTarget=page;
  $modalTitle.textContent='Rename Page';
  $modalInput.value=page.name;$modalInput.placeholder='Page name…';
  $modalSub.textContent='';
  $modalOk.textContent='Rename';
  $modalBg.classList.add('active');
  setTimeout(()=>{$modalInput.focus();$modalInput.select();},60);
}
function closeModal(){$modalBg.classList.remove('active');}

$modalOk.addEventListener('click',()=>{
  const name=($modalInput.value||'').trim();
  if(!name)return;
  if(_modalMode==='createFolder'){
    const id=uid();
    refFolders.child(id).set({pageId:currentPageId,name,date:new Date().toISOString()})
      .then(()=>toast(`Folder "${name}" created`))
      .catch(err=>{console.error(err);toast('Failed to save folder')});
  } else if(_modalMode==='renameFolder' && _editTarget){
    refFolders.child(_editTarget.id).update({name})
      .then(()=>toast('Folder renamed'))
      .catch(err=>{console.error(err);toast('Failed to rename')});
  } else if(_modalMode==='createPage'){
    const id=uid();
    refPages.child(id).set({name,date:new Date().toISOString()})
      .then(()=>{currentPageId=id;currentFolderId=null;renderAll();toast(`Page "${name}" created`);})
      .catch(err=>{console.error(err);toast('Failed to save page')});
  } else if(_modalMode==='renamePage' && _editTarget){
    refPages.child(_editTarget.id).update({name})
      .then(()=>toast('Page renamed'))
      .catch(err=>{console.error(err);toast('Failed to rename')});
  }
  closeModal();
});
$modalX.addEventListener('click',closeModal);
$modalBg.addEventListener('click',e=>{if(e.target===$modalBg)closeModal();});
$modalInput.addEventListener('keydown',e=>{if(e.key==='Enter')$modalOk.click();if(e.key==='Escape')closeModal();});

document.getElementById('newFolderBtn').addEventListener('click',openCreateModal);
document.getElementById('newPageBtn').addEventListener('click',openCreatePageModal);

async function deletePage(page){
  const pageFolders=folders.filter(f=>f.pageId===page.id);
  const pagePhotos =photos.filter(p=>p.pageId===page.id);
  const msg=`Delete page "${page.name}"?\n\n` +
    `This will also delete:\n• ${pageFolders.length} folder${pageFolders.length!==1?'s':''}\n• ${pagePhotos.length} photo${pagePhotos.length!==1?'s':''}\n\nThis cannot be undone.`;
  if(!confirm(msg))return;

  try{
    await Promise.all(pagePhotos.map(p=>removePhotoFull(p)));
    const fupdates={};
    pageFolders.forEach(f=>{fupdates[f.id]=null;});
    if(Object.keys(fupdates).length)await refFolders.update(fupdates);
    await refPages.child(page.id).remove();
    if(currentPageId===page.id){
      currentPageId=pages.find(p=>p.id!==page.id)?.id||null;
      currentFolderId=null;
    }
    toast('Page deleted');
    renderAll();
  }catch(err){console.error(err);toast('Failed to delete page')}
}

document.getElementById('fileInput').addEventListener('change',e=>{if(e.target.files.length)addFiles(e.target.files);e.target.value='';});

const $dov=document.getElementById('dragOv');
let dn=0;
document.addEventListener('dragenter',e=>{e.preventDefault();dn++;$dov.classList.add('active');});
document.addEventListener('dragleave',()=>{if(--dn<=0){dn=0;$dov.classList.remove('active');}});
document.addEventListener('dragover',e=>e.preventDefault());
document.addEventListener('drop',e=>{e.preventDefault();dn=0;$dov.classList.remove('active');if(e.dataTransfer.files.length)addFiles(e.dataTransfer.files);});

const $sortBtn =document.getElementById('sortBtn');
const $sortMenu=document.getElementById('sortMenu');
function refreshSortChecks(){
  document.querySelectorAll('.sort-opt').forEach(o=>o.classList.toggle('active',o.dataset.sort===sortMode));
}
$sortBtn.addEventListener('click',e=>{e.stopPropagation();$sortMenu.classList.toggle('active');refreshSortChecks();});
document.querySelectorAll('.sort-opt').forEach(o=>{
  o.addEventListener('click',e=>{
    e.stopPropagation();
    sortMode=o.dataset.sort;saveUI();refreshSortChecks();
    $sortMenu.classList.remove('active');renderAll();
    toast(`Sorted by ${sortLabel(sortMode)}`);
  });
});
document.addEventListener('click',()=>$sortMenu.classList.remove('active'));

/* ═══════════════════════════════════════════════
   LIGHTBOX
═══════════════════════════════════════════════ */
const $lb =document.getElementById('lightbox');
const $lbW=document.getElementById('lbWrap');
const $lbT=document.getElementById('lbTitle');
const $lbS=document.getElementById('lbSub');
const $lbC=document.getElementById('lbCtr');

function viewList(list){return list.filter(p=>!!p.previewUrl);}
function openLightbox(pid,list){lbPhotoId=pid;window._lbList=list;showLb();$lb.classList.add('active');document.body.style.overflow='hidden';}
function closeLightbox(){$lb.classList.remove('active');document.body.style.overflow='';$lbW.innerHTML='';}
function showLb(){
  const list=window._lbList||[];const vl=viewList(list);
  if(!vl.length){closeLightbox();return;}
  let p=vl.find(x=>x.id===lbPhotoId)||vl[0];lbPhotoId=p.id;
  $lbW.innerHTML='';
  const img=document.createElement('img');img.className='lb-img';img.src=p.previewUrl;img.alt=p.name;$lbW.appendChild(img);
  const vi=vl.indexOf(p);
  $lbT.textContent=p.name;$lbS.textContent=`${fmtB(p.size||0)} · ${fmtD(p.date)}`;
  $lbC.textContent=`${vi+1} / ${vl.length}`;
}
function lbNav(d){
  const list=window._lbList||[];const vl=viewList(list);if(!vl.length)return;
  const ci=vl.findIndex(x=>x.id===lbPhotoId);
  lbPhotoId=vl[(ci+d+vl.length)%vl.length].id;showLb();
}
document.getElementById('lbClose').addEventListener('click',closeLightbox);
document.getElementById('lbPrev').addEventListener('click',()=>lbNav(-1));
document.getElementById('lbNext').addEventListener('click',()=>lbNav(+1));
$lb.addEventListener('click',e=>{if(e.target===$lb)closeLightbox();});
document.addEventListener('keydown',e=>{
  if(!$lb.classList.contains('active'))return;
  if(e.key==='Escape')closeLightbox();
  if(e.key==='ArrowLeft')lbNav(-1);
  if(e.key==='ArrowRight')lbNav(+1);
});
let tx=null;
$lb.addEventListener('touchstart',e=>{tx=e.touches[0].clientX;});
$lb.addEventListener('touchend',e=>{if(tx===null)return;const dx=e.changedTouches[0].clientX-tx;if(Math.abs(dx)>46)lbNav(dx<0?1:-1);tx=null;});

document.getElementById('logo').addEventListener('click',()=>{currentFolderId=null;renderAll();});
document.getElementById('sbToggle').addEventListener('click',e=>{
  e.stopPropagation();
  document.getElementById('sidebar').classList.toggle('open');
});
document.addEventListener('click',e=>{
  const sb=document.getElementById('sidebar');
  if(window.innerWidth<=760 && sb.classList.contains('open') && !sb.contains(e.target) && e.target.id!=='sbToggle'){
    sb.classList.remove('open');
  }
});

const $toast=document.getElementById('toast');
let _tt;
function toast(msg){$toast.textContent=msg;$toast.classList.add('show');clearTimeout(_tt);_tt=setTimeout(()=>$toast.classList.remove('show'),2800);}

function el(tag,cls,txt){const e=document.createElement(tag);e.className=cls;if(txt!==undefined)e.textContent=txt;return e;}
